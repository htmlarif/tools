<!doctype html>
<html lang="bn">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Age Calculator (বাংলা/English)</title>
  <meta name="description" content="Simple Age Calculator - বাংলা/English" />

  <style>
    :root{
      --bg:#f5f7fb;
      --card:#ffffff;
      --text:#0f172a;
      --muted:#5b6b8c;
      --line:rgba(15,23,42,.08);
      --btn:#2e6bff;
      --btnText:#ffffff;
      --shadow:0 10px 30px rgba(15,23,42,.08);
    }

    body.dark{
      --bg:#0b1220;
      --card:#101a2e;
      --text:#eaf0ff;
      --muted:#93a4c7;
      --line:rgba(255,255,255,.10);
      --btn:#2e6bff;
      --btnText:#ffffff;
      --shadow:0 12px 40px rgba(0,0,0,.35);
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .wrap{
      max-width:720px;
      margin:auto;
      padding:20px;
    }

    header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:20px;
    }

    .card{
      background:var(--card);
      border-radius:18px;
      padding:18px;
      box-shadow:var(--shadow);
      border:1px solid var(--line);
    }

    h1{margin:0 0 6px;font-size:22px}
    .sub{margin:0;color:var(--muted);font-size:14px}

    label{
      font-size:13px;
      color:var(--muted);
      display:block;
      margin-bottom:6px;
    }

    input{
      width:100%;
      height:46px;
      border-radius:12px;
      border:1px solid var(--line);
      padding:10px;
      font-size:14px;
    }

    .row{
      display:flex;
      gap:10px;
      margin-top:12px;
      flex-wrap:wrap;
    }

    button{
      height:46px;
      padding:0 14px;
      border:none;
      border-radius:12px;
      font-weight:700;
      cursor:pointer;
    }

    .primary{
      background:var(--btn);
      color:var(--btnText);
    }

    .secondary{
      background:var(--card);
      border:1px solid var(--line);
      color:var(--text);
    }

    .kpi{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:10px;
      margin-top:14px;
    }

    .tile{
      border:1px solid var(--line);
      border-radius:14px;
      padding:10px;
      text-align:center;
    }

    .num{
      font-size:22px;
      font-weight:900;
    }

    .lab{
      font-size:12px;
      color:var(--muted);
    }

    .summary{
      margin-top:12px;
      font-weight:800;
      font-size:15px;
    }

    .top-controls{
      display:flex;
      gap:10px;
      align-items:center;
    }

    select{
      height:36px;
      border-radius:10px;
      border:1px solid var(--line);
    }

  </style>
</head>

<body>
  <div class="wrap">
    <header>
      <div>
        <strong>🧮 Tools</strong>
      </div>

      <div class="top-controls">
        <button class="secondary" id="modeToggle">🌙</button>

        <select id="lang">
          <option value="bn">বাংলা</option>
          <option value="en">English</option>
        </select>
      </div>
    </header>

    <div class="card">
      <h1 id="title">Age Calculator</h1>
      <p class="sub" id="subtitle">জন্মতারিখ দিয়ে বয়স বের করুন</p>

      <div style="margin-top:12px">
        <label id="lblDob">জন্মতারিখ</label>
        <input type="date" id="dob">
      </div>

      <div class="row">
        <button class="primary" id="calcBtn">Calculate</button>
        <button class="secondary" id="resetBtn">Reset</button>
      </div>

      <div class="kpi">
        <div class="tile">
          <div class="num" id="years">—</div>
          <div class="lab" id="labYears">Years</div>
        </div>

        <div class="tile">
          <div class="num" id="months">—</div>
          <div class="lab" id="labMonths">Months</div>
        </div>

        <div class="tile">
          <div class="num" id="days">—</div>
          <div class="lab" id="labDays">Days</div>
        </div>
      </div>

      <div class="summary" id="summary">—</div>
    </div>
  </div>

<script>
const lang = document.getElementById("lang");

const I18N = {
  bn:{
    title:"Age Calculator",
    subtitle:"জন্মতারিখ দিয়ে বয়স বের করুন",
    dob:"জন্মতারিখ",
    years:"বছর",
    months:"মাস",
    days:"দিন"
  },
  en:{
    title:"Age Calculator",
    subtitle:"Calculate your age instantly",
    dob:"Date of Birth",
    years:"Years",
    months:"Months",
    days:"Days"
  }
};

function setLang(l){
  const t = I18N[l];
  document.getElementById("title").textContent = t.title;
  document.getElementById("subtitle").textContent = t.subtitle;
  document.getElementById("lblDob").textContent = t.dob;
  document.getElementById("labYears").textContent = t.years;
  document.getElementById("labMonths").textContent = t.months;
  document.getElementById("labDays").textContent = t.days;
}

lang.addEventListener("change",()=>setLang(lang.value));
setLang("bn");

document.getElementById("calcBtn").onclick = () => {
  const dob = new Date(document.getElementById("dob").value);
  if(!document.getElementById("dob").value) return;

  const today = new Date();
  let years = today.getFullYear() - dob.getFullYear();
  let months = today.getMonth() - dob.getMonth();
  let days = today.getDate() - dob.getDate();

  if(days < 0){
    months--;
    days += new Date(today.getFullYear(), today.getMonth(), 0).getDate();
  }

  if(months < 0){
    years--;
    months += 12;
  }

  document.getElementById("years").textContent = years;
  document.getElementById("months").textContent = months;
  document.getElementById("days").textContent = days;

  document.getElementById("summary").textContent =
    `${years}Y ${months}M ${days}D`;
};

document.getElementById("resetBtn").onclick = () => {
  document.getElementById("dob").value="";
  document.getElementById("years").textContent="—";
  document.getElementById("months").textContent="—";
  document.getElementById("days").textContent="—";
  document.getElementById("summary").textContent="—";
};

// 🌗 Dark toggle
const toggle = document.getElementById("modeToggle");
const savedMode = localStorage.getItem("mode");

if(savedMode === "dark"){
  document.body.classList.add("dark");
  toggle.textContent = "☀️";
}

toggle.onclick = () => {
  document.body.classList.toggle("dark");

  if(document.body.classList.contains("dark")){
    toggle.textContent = "☀️";
    localStorage.setItem("mode","dark");
  }else{
    toggle.textContent = "🌙";
    localStorage.setItem("mode","light");
  }
};
</script>

</body>
</html>
